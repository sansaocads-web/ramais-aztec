<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramais - Aztec Contábil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --gray: #95a5a6;
            --border: #ecf0f1;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-lg);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 i {
            color: var(--primary);
            font-size: 40px;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--gray);
            margin-top: 5px;
        }

        .stat {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            min-width: 140px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .stat span {
            display: block;
            font-size: 28px;
            margin: 5px 0;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 18px 12px 45px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            pointer-events: none;
        }

        .search-results {
            font-size: 12px;
            color: var(--gray);
            margin-top: 6px;
            font-weight: 500;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: var(--success);
            color: white;
            padding: 10px 15px;
            font-size: 13px;
        }

        .btn-secondary:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .main-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.7s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tabs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            background: #f9f9f9;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            flex: 1;
            gap: 5px;
        }

        .tabs::-webkit-scrollbar {
            height: 4px;
        }

        .tabs::-webkit-scrollbar-track {
            background: transparent;
        }

        .tabs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .tab {
            padding: 15px 18px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray);
            font-size: 12px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab.ativo {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab.tab-geral {
            background: linear-gradient(135deg, var(--success) 0%, #229954 100%);
            color: white;
            margin-right: 5px;
            border-radius: 6px 6px 0 0;
            border-bottom-color: transparent;
        }

        .tab.tab-geral:hover {
            color: white;
        }

        .tab.tab-geral.ativo {
            color: white;
            border-bottom-color: transparent;
        }

        .btn-add-setor {
            padding: 10px 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            margin: 12px 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-add-setor:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .table-container {
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, var(--dark) 0%, #34495e 100%);
            color: white;
            padding: 18px;
            text-align: left;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 12px;
            sticky: top;
        }

        td {
            padding: 18px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
        }

        tbody tr {
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        tbody tr:hover {
            background: #f8f9fa;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.02);
        }

        .nome-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: var(--dark);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }

        .setor-badge {
            display: inline-block;
            padding: 6px 12px;
            background: linear-gradient(135deg, #e8f4f8 0%, #d4edff 100%);
            color: #0c5460;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #a8d8ea;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ramal-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #f0e6ff 0%, #e6d5ff 100%);
            color: #6f42c1;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid #d4c5f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ramal-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .ramal-badge:active {
            transform: scale(0.98);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-edit {
            background: #3498db;
        }

        .btn-edit:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: var(--danger);
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-1px);
        }

        .empty-state {
            padding: 80px 20px;
            text-align: center;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            font-size: 13px;
            opacity: 0.8;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .footer-date {
            font-size: 12px;
            opacity: 0.7;
            font-weight: 500;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeInBg 0.3s ease-out;
        }

        @keyframes fadeInBg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay.ativo {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 450px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content h2 {
            font-size: 26px;
            margin-bottom: 25px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-content h2 i {
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background: #f8f9fa;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-salvar {
            flex: 1;
            background: linear-gradient(135deg, var(--success) 0%, #229954 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .btn-salvar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        .btn-cancelar {
            flex: 1;
            background: var(--light);
            color: var(--dark);
            border: 2px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .btn-cancelar:hover {
            background: var(--border);
        }

        .password-input {
            width: 100%;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            letter-spacing: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            background: #f8f9fa;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .password-error {
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .password-error.mostrar {
            display: block;
        }

        .password-info {
            background: #f0f0ff;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #5555aa;
            margin-bottom: 15px;
            border-left: 3px solid var(--primary);
        }

        .copy-btn {
            background: none;
            border: none;
            color: #6f42c1;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 3px;
            transition: all 0.2s;
            margin-left: 8px;
        }

        .copy-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 2000;
            animation: slideInRight 0.3s ease-out;
        }

        .toast.mostrar {
            display: block;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .stat {
                min-width: 100px;
            }

            .controls {
                width: 100%;
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            th, td {
                padding: 12px;
                font-size: 13px;
            }

            .actions {
                flex-wrap: wrap;
            }

            .btn-edit, .btn-delete {
                padding: 6px 10px;
                font-size: 11px;
            }

            .modal-content {
                padding: 25px;
            }

            .tabs-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .tabs {
                width: 100%;
            }

            .btn-add-setor {
                width: 100%;
                justify-content: center;
            }

            .nome-cell {
                flex-direction: column;
                align-items: flex-start;
            }

            .avatar {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-content">
            <div>
                <h1><i class="fas fa-phone-alt"></i> Ramais</h1>
                <div class="header-subtitle">Diretório de contatos - Aztec Contábil</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total de Ramais</div>
                <span id="totalRamais">0</span>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="busca" placeholder="🔍 Pesquise por nome, ramal ou setor..." onkeyup="filtrar()">
                <div class="search-results" id="searchResults"></div>
            </div>
            <button class="btn btn-primary" onclick="abrirModalAdicionar()">
                <i class="fas fa-plus"></i> Adicionar
            </button>
        </div>
    </div>

    <div class="main-card">
        <div class="tabs-header">
            <div class="tabs" id="tabs"></div>
            <button class="btn-add-setor" onclick="abrirModalNovoSetor()">
                <i class="fas fa-folder-plus"></i> Novo Setor
            </button>
        </div>
        <div id="conteudo"></div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <p>✨ Sistema de Ramais Interno</p>
            <div class="footer-date">
                <i class="fas fa-calendar-alt"></i> Última atualização: <span id="dataAtualizacao"></span>
            </div>
        </div>
    </div>
</div>

<!-- Toast de Cópia -->
<div class="toast" id="toast">
    <i class="fas fa-check"></i> Ramal copiado!
</div>

<!-- Modal de Senha -->
<div class="modal-overlay" id="modalSenha">
    <div class="modal-content">
        <h2><i class="fas fa-lock"></i> Autenticação</h2>
        <div class="password-info"><i class="fas fa-info-circle"></i> Digite a senha de 4 dígitos para continuar</div>
        <div class="password-error" id="erroSenha"><i class="fas fa-exclamation-circle"></i> Senha incorreta!</div>
        <input type="password" id="inputSenha" class="password-input" placeholder="••••" maxlength="4" onkeypress="if(event.key=='Enter') verificarSenha()">
        <div class="buttons">
            <button class="btn-cancelar" onclick="fecharModalSenha()"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal de Novo Setor -->
<div class="modal-overlay" id="modalNovoSetor">
    <div class="modal-content">
        <h2><i class="fas fa-folder-plus"></i> Novo Setor</h2>
        <div class="form-group">
            <label><i class="fas fa-building"></i> Nome do Setor:</label>
            <input type="text" id="nomeSetor" placeholder="Ex: ADMINISTRATIVO">
        </div>
        <div class="buttons">
            <button class="btn-salvar" onclick="salvarNovoSetor()"><i class="fas fa-save"></i> Criar</button>
            <button class="btn-cancelar" onclick="fecharModalNovoSetor()"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal de Adicionar/Editar -->
<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <h2 id="titulo"><i class="fas fa-plus-circle"></i> Adicionar Ramal</h2>
        <div class="form-group">
            <label><i class="fas fa-user"></i> Nome:</label>
            <input type="text" id="nome" placeholder="Ex: João Silva">
        </div>
        <div class="form-group">
            <label><i class="fas fa-building"></i> Setor:</label>
            <select id="setor">
                <option value="">Selecione um setor...</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-phone"></i> Ramal:</label>
            <input type="text" id="ramal" placeholder="Ex: 2230">
        </div>
        <div class="buttons">
            <button class="btn-salvar" onclick="salvar()"><i class="fas fa-save"></i> Salvar</button>
            <button class="btn-cancelar" onclick="fecharModal()"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>
</div>

<script>
    const SENHA_CORRETA = '3223';

    let setores = {};

    async function salvarDados() {
        await fetch('/api/setores', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(setores)
        });
    }

    let operacao = 'adicionar';
    let setorEditando = null;
    let indexEditando = null;
    let setorAtivo = null;
    let buscaAtiva = '';
    let operacaoSenha = null;
    let setorDeletando = null;
    let indexDeletando = null;

    function removerAcentos(texto) {
        return texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function fuzzyMatch(busca, texto) {
        const buscaLimpa = removerAcentos(busca.toUpperCase());
        const textoLimpo = removerAcentos(texto.toUpperCase());
        
        let buscaIdx = 0;
        let textoIdx = 0;
        let score = 0;
        
        while (buscaIdx < buscaLimpa.length && textoIdx < textoLimpo.length) {
            if (buscaLimpa[buscaIdx] === textoLimpo[textoIdx]) {
                score++;
                buscaIdx++;
            }
            textoIdx++;
        }
        
        return buscaIdx === buscaLimpa.length ? score : -1;
    }

    function atualizarDataUltimaAtualizacao() {
        const agora = new Date();
        const opcoes = { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        };
        const dataFormatada = agora.toLocaleDateString('pt-BR', opcoes);
        document.getElementById('dataAtualizacao').innerText = dataFormatada;
    }

    function mostrarToast(mensagem) {
        const toast = document.getElementById('toast');
        toast.textContent = '✓ ' + mensagem;
        toast.classList.add('mostrar');
        setTimeout(() => toast.classList.remove('mostrar'), 2000);
    }

    function copiarRamal(ramal, event) {
        event.stopPropagation();
        navigator.clipboard.writeText(ramal).then(() => {
            mostrarToast('Ramal copiado!');
        });
    }

    async function init() {
        atualizarDataUltimaAtualizacao();
        const resp = await fetch('/api/setores');
        setores = await resp.json();
        renderizarTabs();
        abrirSetor('GERAL');
        atualizarTotal();
        atualizarSelectSetores();
    }

    function renderizarTabs() {
        const tabs = document.getElementById('tabs');
        tabs.innerHTML = '<button class="tab tab-geral" onclick="abrirSetor(\'GERAL\')"><i class="fas fa-th"></i> GERAL</button>' + Object.keys(setores).map(s => `<button class="tab" onclick="abrirSetor('${s}')">${s}</button>`).join('');
    }

    function atualizarSelectSetores() {
        const select = document.getElementById('setor');
        const setoresArray = Object.keys(setores);
        select.innerHTML = '<option value="">Selecione um setor...</option>' + setoresArray.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function abrirSetor(setor) {
        setorAtivo = setor;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
        document.querySelectorAll('.tab').forEach(t => {
            if(t.textContent.trim() === setor || (setor === 'GERAL' && t.classList.contains('tab-geral'))) {
                t.classList.add('ativo');
            }
        });
        renderizarRamais(setor);
    }

    function renderizarRamais(setor) {
        let todos = [];
        
        if(setor === 'GERAL') {
            Object.keys(setores).forEach(s => {
                setores[s].forEach(r => {
                    todos.push({...r, setor: s});
                });
            });
        } else {
            setores[setor].forEach(r => {
                todos.push({...r, setor: setor});
            });
        }

        let dados = todos;
        
        if(buscaAtiva) {
            dados = dados.filter(r => {
                const scoreNome = fuzzyMatch(buscaAtiva, r.nome);
                const scoreRamal = fuzzyMatch(buscaAtiva, r.ramal);
                const scoreSetor = fuzzyMatch(buscaAtiva, r.setor);
                return scoreNome >= 0 || scoreRamal >= 0 || scoreSetor >= 0;
            });
            
            dados.sort((a, b) => {
                const scoreA = Math.max(fuzzyMatch(buscaAtiva, a.nome), fuzzyMatch(buscaAtiva, a.ramal), fuzzyMatch(buscaAtiva, a.setor));
                const scoreB = Math.max(fuzzyMatch(buscaAtiva, b.nome), fuzzyMatch(buscaAtiva, b.ramal), fuzzyMatch(buscaAtiva, b.setor));
                return scoreB - scoreA;
            });

            document.getElementById('searchResults').innerText = `${dados.length} resultado${dados.length !== 1 ? 's' : ''} encontrado${dados.length !== 1 ? 's' : ''}`;
        } else {
            document.getElementById('searchResults').innerText = '';
        }

        const html = dados.length ? `
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fas fa-user"></i> Nome</th>
                            <th><i class="fas fa-building"></i> Setor</th>
                            <th><i class="fas fa-phone"></i> Ramal</th>
                            <th style="width: 100px;"><i class="fas fa-cog"></i> Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${dados.map((r, i) => {
                            const indexOriginal = setores[r.setor].findIndex(x => x.nome === r.nome && x.ramal === r.ramal);
                            return `
                            <tr>
                                <td>
                                    <div class="nome-cell">
                                        <div class="avatar">${r.nome[0]}</div>
                                        ${r.nome}
                                    </div>
                                </td>
                                <td><span class="setor-badge" title="${r.setor}">${r.setor}</span></td>
                                <td>
                                    <span class="ramal-badge" onclick="copiarRamal('${r.ramal}', event)" title="Clique para copiar">
                                        <i class="fas fa-phone"></i> ${r.ramal}
                                        <i class="fas fa-copy" style="opacity: 0.6; font-size: 12px;"></i>
                                    </span>
                                </td>
                                <td>
                                    <div class="actions">
                                        <button class="btn-edit" onclick="abrirModalEditar('${r.setor}', ${indexOriginal})" title="Editar"><i class="fas fa-edit"></i></button>
                                        <button class="btn-delete" onclick="abrirModalDeletar('${r.setor}', ${indexOriginal})" title="Deletar"><i class="fas fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        ` : '<div class="empty-state"><i class="fas fa-inbox"></i><p>Nenhum ramal encontrado</p><small>Tente refinar sua busca</small></div>';

        document.getElementById('conteudo').innerHTML = html;
    }

    function filtrar() {
        buscaAtiva = document.getElementById('busca').value;
        if(setorAtivo) renderizarRamais(setorAtivo);
    }

    function atualizarTotal() {
        const total = Object.values(setores).reduce((a, b) => a + b.length, 0);
        document.getElementById('totalRamais').innerText = total;
    }

    function abrirModalAdicionar() {
        operacao = 'adicionar';
        operacaoSenha = 'adicionar';
        setorEditando = setorAtivo === 'GERAL' ? Object.keys(setores)[0] : setorAtivo;
        document.getElementById('modalSenha').classList.add('ativo');
        document.getElementById('inputSenha').value = '';
        document.getElementById('inputSenha').focus();
    }

    function abrirModalEditar(setor, index) {
        operacao = 'editar';
        operacaoSenha = 'editar';
        setorEditando = setor;
        indexEditando = index;
        document.getElementById('modalSenha').classList.add('ativo');
        document.getElementById('inputSenha').value = '';
        document.getElementById('inputSenha').focus();
    }

    function abrirModalDeletar(setor, index) {
        operacaoSenha = 'deletar';
        setorDeletando = setor;
        indexDeletando = index;
        document.getElementById('modalSenha').classList.add('ativo');
        document.getElementById('inputSenha').value = '';
        document.getElementById('inputSenha').focus();
    }

    function abrirModalNovoSetor() {
        operacaoSenha = 'novoSetor';
        document.getElementById('modalSenha').classList.add('ativo');
        document.getElementById('inputSenha').value = '';
        document.getElementById('inputSenha').focus();
    }

    function verificarSenha() {
        if(document.getElementById('inputSenha').value === SENHA_CORRETA) {
            fecharModalSenha();
            if(operacaoSenha === 'adicionar') {
                document.getElementById('titulo').innerHTML = '<i class="fas fa-plus-circle"></i> Adicionar Ramal';
                document.getElementById('nome').value = '';
                document.getElementById('setor').value = setorEditando;
                document.getElementById('ramal').value = '';
                document.getElementById('modal').classList.add('ativo');
                document.getElementById('nome').focus();
            } else if(operacaoSenha === 'editar') {
                const r = setores[setorEditando][indexEditando];
                document.getElementById('titulo').innerHTML = '<i class="fas fa-edit"></i> Editar Ramal';
                document.getElementById('nome').value = r.nome;
                document.getElementById('setor').value = setorEditando;
                document.getElementById('ramal').value = r.ramal;
                document.getElementById('modal').classList.add('ativo');
                document.getElementById('nome').focus();
            } else if(operacaoSenha === 'deletar') {
                deletarRamal();
            } else if(operacaoSenha === 'novoSetor') {
                document.getElementById('modalNovoSetor').classList.add('ativo');
                document.getElementById('nomeSetor').focus();
            }
        } else {
            document.getElementById('erroSenha').classList.add('mostrar');
            document.getElementById('inputSenha').value = '';
            setTimeout(() => document.getElementById('inputSenha').focus(), 100);
        }
    }

    function fecharModalSenha() {
        document.getElementById('modalSenha').classList.remove('ativo');
        document.getElementById('erroSenha').classList.remove('mostrar');
    }

    function fecharModal() {
        document.getElementById('modal').classList.remove('ativo');
    }

    function fecharModalNovoSetor() {
        document.getElementById('modalNovoSetor').classList.remove('ativo');
    }

    async function deletarRamal() {
        setores[setorDeletando].splice(indexDeletando, 1);
        await salvarDados();
        atualizarTotal();
        renderizarRamais(setorAtivo);
        mostrarToast('Ramal removido com sucesso');
    }

    async function salvarNovoSetor() {
        const nome = document.getElementById('nomeSetor').value.trim().toUpperCase();
        if(!nome) { alert('Digite o nome do setor!'); return; }
        if(setores[nome]) { alert('Este setor já existe!'); return; }

        setores[nome] = [];
        await salvarDados();
        renderizarTabs();
        atualizarSelectSetores();
        abrirSetor(nome);
        fecharModalNovoSetor();
        document.getElementById('nomeSetor').value = '';
        mostrarToast('Setor criado com sucesso');
    }

    async function salvar() {
        const n = document.getElementById('nome').value.trim();
        const s = document.getElementById('setor').value.trim();
        const r = document.getElementById('ramal').value.trim();
        if(!n || !s || !r) { alert('Preencha todos os campos!'); return; }

        if(operacao === 'adicionar') {
            if(!setores[s]) setores[s] = [];
            setores[s].push({nome: n, ramal: r});
            renderizarTabs();
            mostrarToast('Ramal adicionado com sucesso');
        } else {
            setores[setorEditando][indexEditando] = {nome: n, ramal: r};
            mostrarToast('Ramal atualizado com sucesso');
        }

        await salvarDados();
        atualizarTotal();
        atualizarDataUltimaAtualizacao();
        fecharModal();
        renderizarRamais(setorAtivo);
        document.getElementById('busca').value = '';
        buscaAtiva = '';
    }

    init();
</script>

</body>
</html>
